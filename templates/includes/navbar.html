{% load static %}
<nav class="navbar">
    <div class="navbar-container">
        <a href="{% url 'home' %}" class="navbar-brand">
            <i class="fa fa-globe"></i> TripPulse
        </a>

        <div class="navbar-search">
            <form action="{% url 'place_list' %}" method="GET">
                <div class="search-input-wrapper">
                    <i class="fa fa-search"></i>
                    <input type="text" name="q" placeholder="Search places..." value="{{ request.GET.q }}">
                </div>
            </form>
        </div>

        <button class="navbar-toggle" id="navbarToggle">
            <i class="fa fa-bars"></i>
        </button>

        <ul class="navbar-menu" id="navbarMenu">
            <li><a href="{% url 'home' %}"><i class="fa fa-home"></i> Home</a></li>
            <li><a href="{% url 'place_list' %}"><i class="fa fa-map-marker-alt"></i> Places</a></li>
            {% if user.is_authenticated %}
                <li><a href="{% url 'post_create' %}"><i class="fa fa-plus-circle"></i> New Post</a></li>
                <li class="dropdown">
                    <button class="dropdown-toggle">
                        {% if user.avatar %}
                            <img src="{{ user.avatar.url }}" alt="avatar" class="nav-avatar">
                        {% else %}
                            <i class="fa fa-user-circle"></i>
                        {% endif %}
                        {{ user.first_name }}
                        <i class="fa fa-chevron-down"></i>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a href="{% url 'profile' %}"><i class="fa fa-user"></i> Profile</a></li>
                        <li><a href="{% url 'my_posts' %}"><i class="fa fa-newspaper"></i> My Posts</a></li>
                        <li><a href="{% url 'saved_posts' %}"><i class="fa fa-bookmark"></i> Saved</a></li>
                        <li><a href="{% url 'profile_update' %}"><i class="fa fa-cog"></i> Settings</a></li>
                        <li class="divider"></li>
                        <li><a href="{% url 'logout' %}"><i class="fa fa-sign-out-alt"></i> Logout</a></li>
                    </ul>
                </li>
            {% else %}
                <li><a href="{% url 'login' %}" class="btn-nav-login"><i class="fa fa-sign-in-alt"></i> Login</a></li>
                <li><a href="{% url 'register' %}" class="btn-nav-register">Get Started</a></li>
            {% endif %}
        </ul>
    </div>
</nav>
