server {
    listen 80;
    server_name trip-pulse.uz www.trip-pulse.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name trip-pulse.uz www.trip-pulse.uz;

    ssl_certificate /etc/letsencrypt/live/trip-pulse.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trip-pulse.uz/privkey.pem;

    location /static/ { alias /vol/static/ };
    location /media/  { alias /vol/media/ };

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}